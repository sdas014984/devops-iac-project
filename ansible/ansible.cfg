[defaults]
inventory = inventory_aws_ec2.yml
host_key_checking = False
deprecation_warnings = False
interpreter_python = /usr/bin/python3
timeout = 120

[inventory]
enable_plugins = amazon.aws.aws_ec2

[connection]
pipelining = True

[persistent_connection]
retries = 3
connect_timeout = 120
command_timeout = 120

[ssh_connection]
retries : 5